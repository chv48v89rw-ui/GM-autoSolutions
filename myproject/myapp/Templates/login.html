{% extends 'base.html' %}

{% block title %}Login - GM autoSolutions{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-7">
            <div class="card">
                <div class="card-header text-center">
                    <h3 class="mb-0">Welcome Back</h3>
                    <p class="text-muted mb-0 mt-2">Login to your account</p>
                </div>
                <div class="card-body p-5">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-4">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                    </form>

                    <hr>

                    <p class="text-center mb-3 text-muted">
                        Don't have an account?
                    </p>

                    <div class="d-grid gap-2">
                        <a href="/register/" class="btn btn-outline-primary">
                            Register as Buyer
                        </a>
                        <a href="/dealership-register/" class="btn btn-outline-primary">
                            Register as Dealership
                        </a>
                    </div>

                    <hr>

                    <p class="text-center text-muted small">
                        <a href="/" class="text-accent">← Back to Home</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
